## tcd transcoder only (connects to urfd on a remote host)
## Set ServerAddress in tcd.ini to the IP of the urfd host

services:
  tcd:
    build:
      context: ../docker-tcd
      dockerfile: Dockerfile
    image: tcd:latest
    container_name: tcd
    network_mode: host
    restart: unless-stopped
    privileged: true
    cpu_shares: 1024
    ulimits:
      rtprio: 99
      nice: -20
    volumes:
      - ./tcd.ini:/etc/tcd/tcd.ini:ro
      - /sys:/sys
    devices:
      - /dev/bus/usb:/dev/bus/usb
