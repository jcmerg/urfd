## Combined: urfd reflector + tcd transcoder on Synology NAS
## Pre-built images, no build step

services:
  urfd:
    image: urfd:latest
    container_name: urfd
    network_mode: host
    restart: unless-stopped
    volumes:
      - /volume1/docker/urfd/config:/usr/local/etc/urfd
      - /volume1/docker/urfd/dashboard/config.inc.php:/var/www/urfd-dashboard/pgs/config.inc.php
      - /volume1/docker/urfd/xlxd-ch:/var/lib/xlxd-ch
      - urfd-xml:/var/log
    healthcheck:
      test: ["CMD", "pgrep", "urfd"]
      interval: 30s
      timeout: 5s
      retries: 3

  tcd:
    image: tcd:latest
    container_name: tcd
    network_mode: host
    restart: unless-stopped
    privileged: true
    cpu_shares: 1024
    ulimits:
      rtprio: 99
      nice: -20
    volumes:
      - /volume1/docker/tcd/tcd.ini:/etc/tcd/tcd.ini:ro
      - /sys:/sys
    devices:
      - /dev/bus/usb:/dev/bus/usb
    depends_on:
      urfd:
        condition: service_healthy

volumes:
  urfd-xml:
