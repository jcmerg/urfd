## urfd reflector only on Synology NAS (tcd runs on a separate host)
## Pre-built image, no build step

services:
  urfd:
    image: urfd:latest
    container_name: urfd
    network_mode: host
    restart: unless-stopped
    volumes:
      - /volume1/docker/urfd/config:/usr/local/etc/urfd
      - /volume1/docker/urfd/dashboard/config.inc.php:/var/www/urfd-dashboard/pgs/config.inc.php
      - /volume1/docker/urfd/xlxd-ch:/var/lib/xlxd-ch
      - /volume1/docker/urfd/log:/var/log
    healthcheck:
      test: ["CMD", "pgrep", "urfd"]
      interval: 30s
      timeout: 5s
      retries: 3
