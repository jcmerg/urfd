## urfd reflector only (tcd runs on a separate host)

services:
  urfd:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      additional_contexts:
        optfiles: .
    image: urfd:latest
    container_name: urfd
    network_mode: host
    restart: unless-stopped
    volumes:
      - /opt/urfd/config:/usr/local/etc/urfd
      - /opt/urfd/dashboard/config.inc.php:/var/www/urfd-dashboard/pgs/config.inc.php
      - /opt/urfd/xlxd-ch:/var/lib/xlxd-ch
      - urfd-xml:/var/log
    healthcheck:
      test: ["CMD", "pgrep", "urfd"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  urfd-xml:
