##############################################################################
#  URFD Configuration
#  Comments begin with '#' or ';'. Do not use quotes unless in a comment.
##############################################################################

[Names]
Callsign = URF???              # Reflector callsign (A-Z, 0-9 only)
SysopEmail = me@somewhere.com
Country = DE                   # 2-letter ISO country code (https://www.iban.com/country-codes)
Sponsor = My Club
DashboardUrl = https://my-reflector.example.com

# DHT bootstrap node. Choose a nearby, active reflector or use xrf757.openquad.net
Bootstrap = xrf757.openquad.net

##############################################################################
#  Network
##############################################################################

[IP Addresses]
IPv4Binding = 0.0.0.0          # Usually the 'any' address
# IPv6Binding = ::             # Uncomment for dual-stack (IPv4 + IPv6)
# IPv4External = 4.3.2.1       # Override auto-detection (ipv4.icanhazip.com)
# IPv6External = f:e:d:c:b:a:9:0

##############################################################################
#  Modules
#  Up to 26 modules (A-Z), non-contiguous allowed.
#  Each module can have a description shown in the dashboard.
##############################################################################

[Modules]
Modules = ADMSZ
DescriptionA = All Modes
DescriptionD = DMR Chat
DescriptionM = M17 Chat
DescriptionS = DStar Chat
DescriptionZ = Echo

##############################################################################
#  Transcoder
#  Enables cross-mode audio between protocols (requires tcd).
#  Set Port = 0 if no transcoder is available.
##############################################################################

[Transcoder]
Port = 10100
BindingAddress = 127.0.0.1     # Loopback for local tcd, 0.0.0.0 for remote
Modules = A                    # Which modules to transcode (max 3 with hardware)

##############################################################################
#  Echo Module
#  Built-in parrot/echo. Plays back audio after 3 seconds of silence.
##############################################################################

[Echo]
Enable = true
Module = Z                     # Must be listed in [Modules] above

##############################################################################
#  Protocols
#  All protocols support Enable = true/false (default: true).
#  Disabled protocols won't bind their port or appear in the dashboard.
##############################################################################

# --- D-Star ---

[DCS]
# Enable = true
Port = 30051
# Callsign = DCS363            # Optional: callsign for native DCS peering

[DExtra]
# Enable = true
Port = 30001

[DPlus]
# Enable = true
Port = 20001

[G3]
Enable = true                  # Icom Terminal/Access Point mode (high resource usage)

# --- DMR ---

[MMDVM]
# Enable = true
Port = 62030
DefaultId = 0                  # Default DMR ID (0 = auto)

[DMRPlus]
# Enable = true
Port = 8880

# --- M17 ---

[M17]
# Enable = true
Port = 17000

# --- YSF / C4FM ---
#  URF acts as a YSF Master providing Wires-X rooms (one per module).
#  No registration at ysfreflector.de needed - URF is discovered via XLX API.
#  DG-ID module selection: DG-ID 10=A, 11=B, ... 35=Z

[YSF]
# Enable = true
Port = 42000
AutoLinkModule = A             # Module YSF clients land on at connect (comment out to disable)
EnableDGID = false             # Allow module switching via DG-ID values 10-35
DefaultTxFreq = 446500000
DefaultRxFreq = 446500000
RegistrationID = 12345         # Numeric ID for YSF status packets (any unique number)
RegistrationName = DE URF???   # Display name for YSF clients (max 13 chars)
RegistrationDescription = URF Reflector  # Description (max 16 chars)

# --- P25 ---

[P25]
# Enable = true
Port = 41000
AutoLinkModule = A             # Comment out to disable auto-link
ReflectorID = 12345

# --- NXDN ---

[NXDN]
# Enable = true
Port = 41400
AutoLinkModule = A             # Comment out to disable auto-link
ReflectorID = 12345

# --- URF Interlink ---

[URF]
# Enable = true
Port = 10017

# --- XLX Peering ---
#  Required for XLX peers and DCS peers using XLX protocol in urfd.interlink.
#  Optional Callsign overrides how this reflector identifies to XLX peers.

[XLXPeer]
Enable = false
Port = 10002
# Callsign = XLX363

# --- USRP / AllStar ---

[USRP]
Enable = false
Callsign = ALLSTAR
IPAddress = 1.2.3.4            # AllStar node IP
RxPort = 34000
TxPort = 32000
Module = A                     # Must be a transcoded module
# FilePath = /home/user/clients.txt  # Optional: list of listen-only clients

# --- MMDVMClient ---
#  Connect to a DMR master server via the MMDVM protocol.
#  Maps talkgroups to reflector modules with timeslot support.
#  Static talkgroups may need to be configured on the master server.

[MMDVMClient]
Enable = false
MasterAddress = 44.131.4.1     # MMDVM master server IP or DNS hostname
MasterPort = 62031
# LocalPort = 12345             # Fixed local UDP source port (omit = OS assigns ephemeral port)
#                               # Only needed if a firewall restricts outbound source ports
DmrId = 1234567                # Your registered DMR/hotspot ID
Password = changeme            # MMDVM hotspot security password
Callsign = N0CALL
Latitude = 0.0
Longitude = 0.0
Location = My City
Description = My URF Reflector
URL = https://example.com
RxFreq = 430412500
TxFreq = 439812500
# Software = MMDVM_URFD_Virtual    # Optional override
# Firmware = 20260325_URFD         # Optional override
# FallbackDmrId = 1234567         # DMR ID for callers not in the DMR database (0 or omit = drop stream)
# BlockProtocols = SvxReflector,YSF  # Comma-separated list of protocols to block bidirectionally
#
# TG mapping: TG<number> = <Module>[,TS<1|2>]
# Each module may only have one TG. Default timeslot is TS2.
TG91 = A,TS2                  # Worldwide -> Module A on Timeslot 2
# TG262 = B,TS2               # Germany -> Module B on Timeslot 2

# --- SvxReflector ---
#  Connect to a SvxLink SvxReflector server (e.g. FM-Funknetz).
#  Uses TCP for signaling (auth, heartbeat, talker start/stop) and
#  UDP for OPUS-encoded audio. Requires transcoded modules.
#  Audio is bridged bidirectionally with all other protocols on the module.

[SvxReflector]
Enable = false
Host = svxreflector.example.com   # DNS hostname or IP of the SvxReflector server
Port = 5300                        # TCP and UDP port
Callsign = N0CALL-HS              # Node callsign (as registered on the SvxReflector)
Password = changeme                # Authentication password
# BlockProtocols = MMDVMClient,USRP  # Comma-separated list of protocols to block bidirectionally
# RxGain = 0                          # Incoming audio gain in dB (-40 to +40, default 0)
# TxGain = 0                          # Outgoing audio gain in dB (-40 to +40, default 0)
#
# TG mapping: TG<number> = <Module>
# Maps SvxReflector talkgroups to reflector modules. Modules must be transcoded.
# TG1 = A

##############################################################################
#  Databases
#  Mode: "http", "file", or "both" (http loaded first, then file appended)
##############################################################################

[DMR ID DB]
Mode = http
FilePath = /home/user/dmrid.dat
URL = http://xlxapi.rlx.lu/api/exportdmr.php
RefreshMin = 179

[NXDN ID DB]
Mode = http
FilePath = /home/user/nxdn.dat
URL = https://radioid.net/static/nxdn.csv
RefreshMin = 1440              # radioid.net updates once per day

[YSF TX/RX DB]
Mode = http
FilePath = /home/user/ysfnode.dat
URL = http://xlxapi.rlx.lu/api/exportysfrepeaters.php
RefreshMin = 191

##############################################################################
#  File Paths
##############################################################################

[Files]
PidPath = /var/run/xlxd.pid
XmlPath = /var/log/xlxd.xml
# JsonPath = /var/tmp/urfd.json      # Future use
WhitelistPath = /home/user/urfd.whitelist
BlacklistPath = /home/user/urfd.blacklist
InterlinkPath = /home/user/urfd.interlink
G3TerminalPath = /home/user/urfd.terminal
