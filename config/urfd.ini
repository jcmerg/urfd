##############################################################################
#  URFD Configuration
#  Comments begin with '#' or ';'. Do not use quotes unless in a comment.
#
#  SIGHUP Reload:
#    Most settings can be reloaded at runtime by sending SIGHUP to the
#    urfd process. See the README for which parameters require a restart.
#    Docker: docker exec <container> kill -HUP $(pgrep urfd)
##############################################################################

[Names]
Callsign = URF???              # Reflector callsign (A-Z, 0-9 only)
SysopEmail = me@somewhere.com
Country = DE                   # 2-letter ISO country code (https://www.iban.com/country-codes)
Sponsor = My Club
DashboardUrl = https://my-reflector.example.com

# DHT bootstrap node. Choose a nearby, active reflector or use xrf757.openquad.net
Bootstrap = xrf757.openquad.net

##############################################################################
#  Network
#  IPv4Binding is required. IPv6 is optional (uncomment for dual-stack).
#  External addresses are auto-detected via icanhazip.com if not set.
#  [requires restart]
##############################################################################

[IP Addresses]
IPv4Binding = 0.0.0.0          # Usually the 'any' address
# IPv6Binding = ::             # Uncomment for dual-stack (IPv4 + IPv6)
# IPv4External = 4.3.2.1       # Override auto-detection (ipv4.icanhazip.com)
# IPv6External = f:e:d:c:b:a:9:0

##############################################################################
#  Modules
#  Up to 26 modules (A-Z), non-contiguous allowed.
#  Each module can have a description shown in the dashboard.
#  [requires restart to add/remove modules]
##############################################################################

[Modules]
Modules = ADMSZ
DescriptionA = All Modes
DescriptionD = DMR Chat
DescriptionM = M17 Chat
DescriptionS = DStar Chat
DescriptionZ = Echo

##############################################################################
#  Transcoder
#  Enables cross-mode audio between protocols (requires tcd).
#  Set Port = 0 if no transcoder is available.
#  Modules string is reloaded on SIGHUP.
#  [port/binding require restart]
##############################################################################

[Transcoder]
Port = 10100
BindingAddress = 127.0.0.1     # Loopback for local tcd, 0.0.0.0 for remote
Modules = A                    # Which modules to transcode (max 3 with hardware)

##############################################################################
#  Echo Module
#  Built-in parrot/echo. Plays back audio after 3 seconds of silence.
#  [requires restart]
##############################################################################

[Echo]
Enable = true
Module = Z                     # Must be listed in [Modules] above

##############################################################################
#  Protocols
#  All protocols support Enable = true/false (default: true).
#  Disabled protocols won't bind their port or appear in the dashboard.
#  [enable/disable and port changes require restart]
##############################################################################

# --- D-Star ---

[DCS]
# Enable = true
Port = 30051
# Callsign = DCS363            # Optional: callsign for native DCS peering

[DExtra]
# Enable = true
Port = 30001

[DPlus]
# Enable = true
Port = 20001

[G3]
Enable = false                 # Icom Terminal/Access Point mode (high resource usage)

# --- DMR ---

[MMDVM]
# Enable = true
Port = 62030
DefaultId = 0                  # Default DMR ID (0 = auto)

[DMRPlus]
# Enable = true
Port = 8880

# --- M17 ---

[M17]
# Enable = true
Port = 17000

# --- YSF / C4FM ---
#  URF acts as a YSF Master providing Wires-X rooms (one per module).
#  No registration at ysfreflector.de needed - URF is discovered via XLX API.
#  DG-ID module selection: DG-ID 10=A, 11=B, ... 35=Z

[YSF]
# Enable = true
Port = 42000
AutoLinkModule = A             # Module YSF clients land on at connect (comment out to disable)
EnableDGID = false             # Allow module switching via DG-ID values 10-35
DefaultTxFreq = 446500000
DefaultRxFreq = 446500000
RegistrationID = 12345         # Numeric ID for YSF status packets (any unique number)
RegistrationName = DE URF???   # Display name for YSF clients (max 13 chars)
RegistrationDescription = URF Reflector  # Description (max 16 chars)

# --- P25 ---

[P25]
# Enable = true
Port = 41000
AutoLinkModule = A             # Comment out to disable auto-link
ReflectorID = 12345

# --- NXDN ---

[NXDN]
# Enable = true
Port = 41400
AutoLinkModule = A             # Module for RAN 0 (comment out to disable)
ReflectorID = 12345
# FallbackNxdnId = 8970        # NXDN ID for unknown callers (0 or omit = drop)
#
# Module selection via RAN (Radio Access Number):
#   RAN 1-26 maps to Module A-Z (RAN 1=A, RAN 2=B, ..., RAN 26=Z)
#   RAN 0 maps to AutoLinkModule (fallback)
# Set the RAN on the NXDN radio to select the desired module.
#
# NXDN ID resolution: NXDN DB -> DMR DB fallback (by callsign).
# Unknown IDs are dropped unless FallbackNxdnId is set.

# --- URF Interlink ---

[URF]
# Enable = true
Port = 10017

# --- XLX Peering ---
#  Required for XLX peers and DCS peers using XLX protocol in urfd.interlink.
#  Optional Callsign overrides how this reflector identifies to XLX peers.

[XLXPeer]
Enable = false
Port = 10002
# Callsign = XLX363

# --- USRP / AllStar ---

[USRP]
Enable = false
Callsign = ALLSTAR
IPAddress = 1.2.3.4            # AllStar node IP
RxPort = 34000
TxPort = 32000
Module = A                     # Must be a transcoded module
# FilePath = /home/user/clients.txt  # Optional: list of listen-only clients

##############################################################################
#  MMDVMClient
#  Connect to a DMR master server (e.g. BrandMeister) via the MMDVM protocol.
#  Maps talkgroups to reflector modules with timeslot support.
#  Multiple TGs can share a module: the first TG listed becomes the primary
#  (used for outbound TX), additional TGs are secondary (inbound RX only).
#  Dynamic TGs can be added at runtime via the Admin interface.
#  TG mappings are reloaded on SIGHUP (dynamic TGs are preserved).
#  [enable/port/master require restart]
##############################################################################

[MMDVMClient]
Enable = false
MasterAddress = 44.131.4.1     # MMDVM master server IP or DNS hostname
MasterPort = 62031
# LocalPort = 12345            # Fixed local UDP source port (omit = OS-assigned)
DmrId = 1234567                # Your registered DMR/hotspot ID
Password = changeme            # MMDVM hotspot security password
Callsign = N0CALL              # Callsign (used for DMR-ID lookup on kerchunk)
Latitude = 0.0
Longitude = 0.0
Location = My City
Description = My URF Reflector
URL = https://example.com
RxFreq = 430412500
TxFreq = 439812500
# Software = MMDVM_URFD_Virtual
# Firmware = 20260325_URFD
# FallbackDmrId = 1234567      # DMR ID for unknown callers (0 or omit = drop)
# BlockProtocols = SvxReflector,YSF  # Block protocols bidirectionally
#
# BrandMeister API (optional): sync static TGs, add/remove via API instead of kerchunk
# Get your API key from BrandMeister SelfCare -> Profile -> Security -> API Keys
# BrandMeisterApiKey = eyJ0eXAiOiJKV1Qi...
#
# TG mapping: TG<number> = <Module>[,TS<1|2>]
# First TG per module = primary (TX/RX). Additional = secondary (RX only).
# Default timeslot is TS2.
TG91 = A,TS2                   # Worldwide -> Module A (primary)
# TG262 = A,TS2                # Germany -> Module A (secondary, RX only)
# TG26363 = B,TS1              # Local -> Module B (primary)

##############################################################################
#  SvxReflector
#  Connect to a SvxLink SvxReflector server (e.g. FM-Funknetz).
#  Uses TCP for signaling (auth, heartbeat, talker start/stop) and
#  UDP for OPUS-encoded audio. Requires transcoded modules.
#  Audio is bridged bidirectionally with all other protocols on the module.
#  Dynamic TGs can be added at runtime via the Admin interface.
#  TG mappings are reloaded on SIGHUP (dynamic TGs are preserved).
#  When all dynamic TGs expire, SELECT_TG(0) is sent to unsubscribe.
#  [enable/host/port require restart]
##############################################################################

[SvxReflector]
Enable = false
Host = svxreflector.example.com   # DNS hostname or IP
Port = 5300                        # TCP and UDP port (same)
Callsign = N0CALL-HS              # Node callsign (as registered on server)
Password = changeme                # Authentication password
# BlockProtocols = MMDVMClient,USRP  # Block protocols bidirectionally
# RxGain = -12                      # Incoming audio gain in dB (-40 to +40, default -12)
# TxGain = 12                       # Outgoing audio gain in dB (-40 to +40, default +12)
#
# TG mapping: TG<number> = <Module>
# Modules must be transcoded. Multiple TGs per module supported.
# TG1 = A

##############################################################################
#  SVXServer
#  Accept incoming connections from SvxLink nodes.
#  Acts as a SvxReflector server (protocol V2, HMAC-SHA1 auth, OPUS audio).
#  Requires transcoded modules. Users authenticate with callsign + password.
#  TG mapping: TG<number> = <Module> (clients select TG via MsgSelectTG).
#  Users and TGs can be managed at runtime via the Admin interface.
#  TG mappings are reloaded on SIGHUP (dynamic TGs are preserved).
#  [enable/port require restart]
##############################################################################

[SVXServer]
Enable = false
Port = 5300                        # TCP and UDP port (same)
# BlockProtocols = MMDVMClient,USRP  # Block protocols bidirectionally
# RxGain = 0                        # Incoming audio gain in dB (-40 to +40)
# TxGain = 0                        # Outgoing audio gain in dB (-40 to +40)
#
# TG mapping: TG<number> = <Module>
# Modules must be transcoded. Multiple TGs per module supported.
# TG26363 = A
#
# User authentication: <Callsign> = <Password>
# Users can also be added/removed at runtime via the Admin interface.
# N0CALL-HS = changeme

##############################################################################
#  Admin Interface
#  JSON-based TCP socket for runtime management from the dashboard.
#  Features: dynamic TG add/remove, kerchunk on demand (MMDVM), reconnect,
#  transcoder stats, live log viewer, protocol block display.
#  The dashboard password must match (set in config.inc.php).
#  [requires restart]
##############################################################################

[Admin]
Enable = false
Port = 10101
Password = changeme
# BindAddress = 127.0.0.1      # Default: loopback only

##############################################################################
#  Databases
#  Mode: "http", "file", or "both" (http loaded first, then file appended)
#  URL and FilePath must serve data in the expected format (see below).
#  RefreshMin = interval in minutes between automatic re-downloads.
##############################################################################

# DMR ID database: semicolon-separated, one entry per line:
#   <dmrid>;<callsign>;<name>;
# Example: 2621001;DL1ABC;John Doe;
# IDs must be 1-9999999. Third field (name) is ignored but must be present.
[DMR ID DB]
Mode = http
FilePath = /home/user/dmrid.dat
URL = http://xlxapi.rlx.lu/api/exportdmr.php
RefreshMin = 179

# NXDN ID database: comma-separated, one entry per line:
#   <nxdnid>,<callsign>,<name>,
# Example: 12345,DL1ABC,John Doe,
# IDs must be 1-65535. Third field (name) is ignored but must be present.
[NXDN ID DB]
Mode = http
FilePath = /home/user/nxdn.dat
URL = https://radioid.net/static/nxdn.csv
RefreshMin = 1440              # radioid.net updates once per day

# YSF TX/RX frequency database: semicolon-separated, one entry per line:
#   <callsign>;<txfreq>;<rxfreq>;
# Example: DL1ABC;439125000;431525000;
# Frequencies in Hz, must be > 40 MHz. Used for YSF node frequency reporting.
[YSF TX/RX DB]
Mode = http
FilePath = /home/user/ysfnode.dat
URL = http://xlxapi.rlx.lu/api/exportysfrepeaters.php
RefreshMin = 191

##############################################################################
#  File Paths
#  Whitelist, blacklist and interlink are reloaded on SIGHUP.
##############################################################################

[Files]
PidPath = /var/run/xlxd.pid
XmlPath = /var/log/xlxd.xml
# JsonPath = /var/tmp/urfd.json      # Future use
WhitelistPath = /home/user/urfd.whitelist
BlacklistPath = /home/user/urfd.blacklist
InterlinkPath = /home/user/urfd.interlink
G3TerminalPath = /home/user/urfd.terminal

